name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            export PATH="$PATH:/root/.bun/bin"
            cd /opt/lobre
            git pull origin main
            bun install
            bun install --cwd src/frontend --frozen-lockfile
            # Install Google Chrome for screenshot endpoint (idempotent)
            which google-chrome-stable 2>/dev/null || {
              wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
              apt-get install -y /tmp/chrome.deb
              rm -f /tmp/chrome.deb
            }
            bun run build:frontend
            mkdir -p /var/log/lobre
            cp infra/Caddyfile /etc/caddy/Caddyfile && systemctl reload caddy || true
            pm2 kill 2>/dev/null || true
            sleep 1
            pm2 start infra/ecosystem.config.cjs
            pm2 save
            sleep 5
            curl -sf http://localhost:3000/api/health \
              || { echo "--- SERVER NOT UP ---"; pm2 logs lobre --lines 30 --nostream; pm2 status; exit 1; }
            echo "Deploy complete: $(date)"
